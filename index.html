<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="TZ_LZ4YPTTEddxmWa3ZADz-hbMQ97UnAw-LrfxQ7qq0" />
    <meta name="google-site-verification" content="ZQD5-NxpUlFbdVE178EJiDB-I2L0HEqj_KcsZi3O9sk" />
    <meta charset="UTF-8">
    <title>Anime Street India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --netflix-red: #E50914; --bg-black: #080808; --card-bg: #181818; --accent: #00ffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background: var(--bg-black); color: white; overflow-x: hidden; scroll-behavior: smooth; }

        /* Navbar */
        nav { background: rgba(0,0,0,0.9); padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; position: fixed; top:0; width: 100%; z-index: 1000; border-bottom: 2px solid var(--netflix-red); }
        .logo { font-size: 22px; font-weight: 900; color: var(--netflix-red); text-transform: uppercase; letter-spacing: -1px; }
        .menu-btn { font-size: 24px; cursor: pointer; color: white; }

        /* Search Bar */
        .search-wrapper { padding: 100px 4% 20px; text-align: center; background: #000; }
        #searchInput { width: 100%; max-width: 600px; padding: 12px; border-radius: 4px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; }
        #searchInput:focus { border-color: var(--netflix-red); }

        /* Grid System */
        .anime-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 10px 4% 30px; }
        .anime-card { background: var(--card-bg); border-radius: 6px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .anime-card:hover { transform: scale(1.05); border-color: var(--accent); }
        .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .info { padding: 8px; font-size: 13px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .section-title { padding: 20px 4% 5px; font-size: 20px; font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ""; width: 4px; height: 20px; background: var(--netflix-red); display: inline-block; }

        @media (max-width: 768px) {
            .anime-row { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
            .section-title { font-size: 18px; }
        }

        footer { padding: 40px 4%; text-align: center; border-top: 1px solid #222; margin-top: 40px; color: #666; font-size: 13px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Anime Street India</div>
    <div class="menu-btn"><i class="fas fa-bars"></i></div>
</nav>

<div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search anime..." onkeyup="searchAnime()">
</div>

<div id="mainLayout">
    <div class="section-title">Action</div>
    <div id="action-grid" class="anime-row"></div>

    <div class="section-title">Adventure</div>
    <div id="adventure-grid" class="anime-row"></div>

    <div class="section-title">Comedy</div>
    <div id="comedy-grid" class="anime-row"></div>

    <div class="section-title">Fantasy</div>
    <div id="fantasy-grid" class="anime-row"></div>

    <div class="section-title">Isekai</div>
    <div id="isekai-grid" class="anime-row"></div>

    <div class="section-title">Romance</div>
    <div id="romance-grid" class="anime-row"></div>

    <div class="section-title">Sci-Fi</div>
    <div id="scifi-grid" class="anime-row"></div>

    <div class="section-title">Movies</div>
    <div id="movies-grid" class="anime-row"></div>
</div>

<div id="searchResultHeader" class="section-title" style="display:none;">Search Results</div>
<div id="searchResultSection" class="anime-row" style="display:none;"></div>

<footer>
    &copy; 2026 Anime Street India
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
    const db = firebase.firestore();
    let allData = [];

    db.collection("anime").onSnapshot(snap => {
        allData = [];
        snap.forEach(doc => { allData.push(doc.data()); });
        renderContent();
    });

    function renderContent() {
        // List of all grid IDs
        const grids = ["action-grid", "adventure-grid", "comedy-grid", "fantasy-grid", "isekai-grid", "romance-grid", "scifi-grid", "movies-grid"];
        grids.forEach(id => { document.getElementById(id).innerHTML = ""; });

        allData.forEach(a => {
            let card = `<div class="anime-card" onclick="openAnime('${a.name}')">
                            <img src="${a.poster}" loading="lazy">
                            <div class="info">${a.name}</div>
                        </div>`;

            let g = (a.genre || "").toLowerCase();
            
            // Rendering logic based on genre
            if(g.includes("action")) document.getElementById("action-grid").innerHTML += card;
            if(g.includes("adventure")) document.getElementById("adventure-grid").innerHTML += card;
            if(g.includes("comedy")) document.getElementById("comedy-grid").innerHTML += card;
            if(g.includes("fantasy")) document.getElementById("fantasy-grid").innerHTML += card;
            if(g.includes("isekai")) document.getElementById("isekai-grid").innerHTML += card;
            if(g.includes("romance")) document.getElementById("romance-grid").innerHTML += card;
            if(g.includes("sci-fi") || g.includes("scifi")) document.getElementById("scifi-grid").innerHTML += card;
            if(g.includes("movie")) document.getElementById("movies-grid").innerHTML += card;
        });

        // Hide empty sections
        grids.forEach(id => {
            if(document.getElementById(id).innerHTML === "") {
                document.getElementById(id).previousElementSibling.style.display = "none";
            } else {
                document.getElementById(id).previousElementSibling.style.display = "flex";
            }
        });
    }

    function searchAnime() {
        let q = document.getElementById("searchInput").value.toLowerCase().trim();
        let main = document.getElementById("mainLayout");
        let resHead = document.getElementById("searchResultHeader");
        let resGrid = document.getElementById("searchResultSection");

        if(q === "") {
            main.style.display = "block"; resHead.style.display = "none"; resGrid.style.display = "none";
            return;
        }
        main.style.display = "none"; resHead.style.display = "block"; resGrid.style.display = "grid";
        let filtered = allData.filter(a => a.name.toLowerCase().includes(q));
        resGrid.innerHTML = filtered.map(a => `<div class="anime-card" onclick="openAnime('${a.name}')"><img src="${a.poster}"><div class="info">${a.name}</div></div>`).join('');
    }

    function openAnime(name) { window.location.href = "episode.html?name=" + encodeURIComponent(name); }
</script>
</body>
</html>
