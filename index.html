    <style>
        :root { --primary: #ff00cc; --accent: #00ffff; --bg: #050505; --card-bg: #141414; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
        body { background: var(--bg); color: white; padding-bottom: 80px; overflow-x: hidden; }

        /* HEADER */
        header { background: rgba(10,10,10,0.9); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .site-logo { width: 45px; height: 45px; border-radius: 8px; }

        /* SLIDER & SEARCH */
        .main-slider { width: 100%; height: 200px; position: relative; overflow: hidden; border-bottom: 2px solid var(--primary); }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: 0.8s; display: flex; align-items: flex-end; }
        .slide.active { opacity: 1; }
        .slide-content { padding: 20px; width: 100%; background: linear-gradient(to top, var(--bg), transparent); }

        .search-container { padding: 15px; background: rgba(255,255,255,0.05); }
        .search-box { display: flex; max-width: 600px; margin: auto; position: relative; }
        .search-box input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid #333; background: #1a1a1a; color: white; outline: none; }
        .search-box input:focus { border-color: var(--accent); }

        /* GRID & SLIDER STYLE */
        .section-title { padding: 15px 20px 5px; font-size: 18px; color: var(--accent); }
        .slider-container { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; scrollbar-width: none; }
        .slider-container::-webkit-scrollbar { display: none; }

        /* SEARCH RESULTS GRID */
        #searchResultSection { display: none; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }

        .anime-card { display: inline-block; width: 130px; margin-right: 15px; background: var(--card-bg); border-radius: 8px; overflow: hidden; vertical-align: top; border: 1px solid #222; cursor: pointer; }
        .anime-card img { width: 100%; height: 180px; object-fit: cover; }
        .anime-card .info { padding: 8px; text-align: center; font-size: 12px; font-weight: bold; white-space: normal; }

        /* MENU */
        #menu { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: #0a0a0a; padding: 30px; transition: 0.4s; z-index: 2000; border-left: 2px solid var(--primary); }
        #menu a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 8px; border-radius: 8px; background: #1a1a1a; font-weight: bold; text-align: center; }
        #menu a:hover { background: var(--primary); }

        .footer-social { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: center; gap: 10px; padding: 15px; border-top: 1px solid #222; }
        .footer-social a { padding: 8px 15px; border-radius: 20px; color: white; text-decoration: none; font-size: 12px; background: #111; border: 1px solid #333; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="https://i.postimg.cc/18mgN4hn/20260202-104302.jpg" class="site-logo">
        <span style="font-weight: bold; color: var(--accent);">ANIME STREET</span>
    </div>
    <div onclick="toggleMenu()" style="font-size: 24px; cursor: pointer; color: var(--primary);"><i class="fas fa-bars"></i></div>
</header>

<nav id="menu">

    <button onclick="toggleMenu()" style="background:none; color:red; border:none; width:100%; cursor:pointer; margin-top: 20px;">Close [X]</button>
</nav>

<div class="main-slider" id="mainSlider"></div>

<div class="search-container">
    <div class="search-box">
        <input id="searchInput" placeholder="Search for your favorite anime..." oninput="searchAnime()">
    </div>
</div>

<div id="searchResultHeader" class="section-title" style="display:none;">Search Results</div>
<div id="searchResultSection"></div>

<div id="categoryContainer"></div>

<div class="footer-social">
    <a href="https://t.me/+ZicfPST7Z0AyN2E1" target="_blank">Telegram</a>
    <a href="https://discord.gg/9zrAmbeqG" target="_blank">Discord</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
    var db = firebase.firestore();

    let allAnimeData = [];
    let menu = document.getElementById("menu");

    function toggleMenu(){ menu.style.right = (menu.style.right === "0px") ? "-100%" : "0px"; }

    db.collection("anime").onSnapshot(snap => {
        allAnimeData = [];
        snap.forEach(doc => { allAnimeData.push(doc.data()); });
        initBannerSlider(allAnimeData);
        initCategoryRows(allAnimeData);
    });

    function initBannerSlider(data) {
        let slider = document.getElementById("mainSlider");
        slider.innerHTML = "";
        data.slice(0, 5).forEach((a, i) => {
            slider.innerHTML += `<div class="slide ${i === 0 ? 'active' : ''}" style="background-image: url('${a.poster}')"><div class="slide-content"><b>${a.name}</b></div></div>`;
        });
        startAutoSlide();
    }

    let currentSlide = 0;
    function startAutoSlide() {
        setInterval(() => {
            let slides = document.querySelectorAll('.slide');
            if(!slides.length) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);
    }

    function initCategoryRows(data) {
        let container = document.getElementById("categoryContainer");
        container.innerHTML = "";
        createRow("Latest Anime", data.slice(0, 10));
        // Aap yahan aur categories add kar sakte hain (e.g. Hindi Dubbed)
    }

    function createRow(title, animeList) {
        let html = `<div class="section-title">${title}</div><div class="slider-container">`;
        animeList.forEach(a => {
            html += `<div class="anime-card" onclick="openAnime('${a.name}')"><img src="${a.poster}"><div class="info">${a.name}</div></div>`;
        });
        html += `</div>`;
        document.getElementById("categoryContainer").innerHTML += html;
    }

    function searchAnime() {
        let q = document.getElementById("searchInput").value.toLowerCase().trim();
        let resultSection = document.getElementById("searchResultSection");
        let resultHeader = document.getElementById("searchResultHeader");
        let categoryBox = document.getElementById("categoryContainer");
        let sliderBox = document.getElementById("mainSlider");

        if (q === "") {
            resultSection.style.display = "none";
            resultHeader.style.display = "none";
            categoryBox.style.display = "block";
            sliderBox.style.display = "block";
            return;
        }

        sliderBox.style.display = "none";
        categoryBox.style.display = "none";
        resultSection.style.display = "grid";
        resultHeader.style.display = "block";

        let filtered = allAnimeData.filter(a => (a.name || "").toLowerCase().includes(q));
        resultSection.innerHTML = "";
        
        if (filtered.length === 0) {
            resultSection.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No Anime Found...</p>";
        } else {
            filtered.forEach(a => {
                resultSection.innerHTML += `<div class="anime-card" style="width:100%; margin:0;" onclick="openAnime('${a.name}')"><img src="${a.poster}"><div class="info">${a.name}</div></div>`;
            });
        }
    }

    function openAnime(name) { window.location.href = "episode.html?name=" + encodeURIComponent(name); }
</script>
</body>
</html>
