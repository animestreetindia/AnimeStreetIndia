name: Firebase Deploy
on:
  push:
    branches:
      - main  # Aapki branch ka naam
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
