name: Hourly Anime Bot
on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Isse GitHub ko pata chalega ki hum naya version hi use karna chahte hain
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Yahan 24 kar diya
      - run: npm install axios
      - run: node auto-fetch.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          
