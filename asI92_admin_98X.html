<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Admin Panel - ASI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --netflix-red: #E50914; --bg: #050505; --card: #181818; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; padding: 10px; margin: 0; }
        .box { max-width: 900px; margin: 20px auto; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--netflix-red); letter-spacing: 1px; text-transform: uppercase; }
        input, textarea, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; outline: none; }
        button { background: var(--netflix-red); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #b00000; transform: scale(1.02); }
        .tab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #333; }
        .tab-btn.active { background: var(--netflix-red); }
        .list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .item-card b { display: block; margin-bottom: 10px; color: #00ffff; font-size: 18px; }
        .btn-group { display: flex; gap: 10px; }
        .edit-btn { background: #27ae60; font-size: 12px; padding: 8px; flex: 1; }
        .del-btn { background: #444; font-size: 12px; padding: 8px; flex: 1; }
        #loginBox { text-align: center; max-width: 400px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 12px; color: #aaa; margin-left: 5px; }
    </style>
</head>
<body>

<div id="loginBox" class="box">
    <h2><i class="fas fa-lock"></i> Admin Access</h2>
    <input id="adminPass" type="password" placeholder="Enter Hard Password">
    <button onclick="checkPass()">Login</button>
</div>

<div id="panel" style="display:none">
    <div class="box">
        <h2>ASI ADMIN PANEL</h2>
        <div class="tab-grid">
            <button id="t1" class="tab-btn active" onclick="switchTab(1)">Anime</button>
            <button id="t2" class="tab-btn" onclick="switchTab(2)">Episodes</button>
        </div>

        <div id="s1">
            <input id="aName" placeholder="Anime Name">
            <input id="aPoster" placeholder="Poster URL">
            <div class="form-grid">
                <div><label>Season</label><input id="aSeason" placeholder="Ex: 1"></div>
                <div><label>Year</label><input id="aYear" placeholder="Ex: 2024"></div>
            </div>
            <div class="form-grid">
                <div>
                    <label>Genre</label>
                    <select id="aGenre">
                        <option value="Action">Action</option>
                        <option value="Adventure">Adventure</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Isekai">Isekai</option>
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Shounen">Shounen</option>
                        <option value="Movies">Movies</option>
                    </select>
                </div>
                <div><label>Rating</label><input id="aRating" placeholder="Ex: 8.5"></div>
            </div>
            <textarea id="aDesc" placeholder="Description" rows="3"></textarea>
            <button onclick="saveAnime()" id="saveBtn">SAVE ANIME DATA</button>
            <div id="animeList" class="list-container"></div>
        </div>

        <div id="s2" style="display:none">
            <select id="animeSelect" onchange="loadEpisodes()"></select>
            <input id="epNo" type="number" placeholder="Episode Number">
            <textarea id="epWatch" placeholder="Watch Link (Iframe/URL)"></textarea>
            <input id="epDown" placeholder="Download Link">
            <button onclick="saveEpisode()" id="epSaveBtn">SAVE EPISODE</button>
            <div id="episodeList" class="list-container"></div>
        </div>
        
        <button onclick="location.reload()" style="background:#333; margin-top:40px">LOGOUT</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
const db = firebase.firestore();
let editId = null, epEditId = null;

function checkPass() {
    if(document.getElementById('adminPass').value === "Ankit@ASI#2026") { 
        document.getElementById('loginBox').style.display = "none";
        document.getElementById('panel').style.display = "block";
        loadAnimeList();
    } else { alert("Wrong Password!"); }
}

function switchTab(n){
    document.getElementById('s1').style.display = n==1?'block':'none';
    document.getElementById('s2').style.display = n==2?'block':'none';
    document.getElementById('t1').className = n==1?'tab-btn active':'tab-btn';
    document.getElementById('t2').className = n==2?'tab-btn active':'tab-btn';
    if(n==2) updateSelect();
}

// FINAL FIXED SAVE ANIME LOGIC
function saveAnime(){
    const d = { 
        name: document.getElementById('aName').value.trim(), 
        poster: document.getElementById('aPoster').value.trim(), 
        genre: document.getElementById('aGenre').value, 
        description: document.getElementById('aDesc').value.trim(), 
        season: document.getElementById('aSeason').value || "1", 
        year: document.getElementById('aYear').value || "", 
        rating: document.getElementById('aRating').value || "" 
    };

    if(!d.name) { alert("Name toh dalo bhai!"); return; }

    const ref = editId ? db.collection("anime").doc(editId).update(d) : db.collection("anime").add(d);
    
    ref.then(() => {
        alert(editId ? "✅ Updated Successfully!" : "🚀 Added Successfully!");
        location.reload(); // Refresh to ensure data change
    }).catch(e => alert("Error: " + e.message));
}

function loadAnimeList(){
    db.collection("anime").onSnapshot(snap => {
        const list = document.getElementById('animeList');
        list.innerHTML = "";
        snap.forEach(doc => {
            let a = doc.data();
            list.innerHTML += `<div class="item-card"><b>${a.name}</b>
                <div class="btn-group">
                    <button class="edit-btn" onclick="editAnime('${doc.id}')">EDIT</button>
                    <button class="del-btn" onclick="deleteDoc('anime','${doc.id}')">DEL</button>
                </div></div>`;
        });
    });
}

function editAnime(id){
    db.collection("anime").doc(id).get().then(s => {
        const a = s.data(); 
        document.getElementById('aName').value = a.name; 
        document.getElementById('aPoster').value = a.poster; 
        document.getElementById('aGenre').value = a.genre; 
        document.getElementById('aDesc').value = a.description;
        document.getElementById('aSeason').value = a.season || ""; 
        document.getElementById('aYear').value = a.year || ""; 
        document.getElementById('aRating').value = a.rating || "";
        editId = id; 
        document.getElementById('saveBtn').innerText = "UPDATE ANIME DATA"; 
        window.scrollTo(0,0);
    });
}

function saveEpisode(){
    const d = { 
        animeName: document.getElementById('animeSelect').value.toLowerCase().trim(), 
        episodeNo: Number(document.getElementById('epNo').value), 
        watch: document.getElementById('epWatch').value.trim(), 
        download: document.getElementById('epDown').value.trim() || "" 
    };

    const ref = epEditId ? db.collection("episodes").doc(epEditId).update(d) : db.collection("episodes").add(d);
    
    ref.then(() => {
        alert("✅ Episode Saved!");
        location.reload(); 
    });
}

function loadEpisodes(){
    let sel = document.getElementById('animeSelect').value.toLowerCase().trim();
    db.collection("episodes").where("animeName","==",sel).orderBy("episodeNo","desc").onSnapshot(snap => {
        const list = document.getElementById('episodeList');
        list.innerHTML = "";
        snap.forEach(doc => {
            list.innerHTML += `<div class="item-card"><b>Episode ${doc.data().episodeNo}</b>
                <div class="btn-group">
                    <button class="edit-btn" onclick="editEp('${doc.id}')">EDIT</button>
                    <button class="del-btn" onclick="deleteDoc('episodes','${doc.id}')">DEL</button>
                </div></div>`;
        });
    });
}

function editEp(id){
    db.collection("episodes").doc(id).get().then(s => {
        let e = s.data(); 
        document.getElementById('epNo').value = e.episodeNo; 
        document.getElementById('epWatch').value = e.watch; 
        document.getElementById('epDown').value = e.download || "";
        epEditId = id; 
        document.getElementById('epSaveBtn').innerText = "UPDATE EPISODE DATA"; 
        window.scrollTo(0,0);
    });
}

function updateSelect(){
    db.collection("anime").get().then(snap => {
        const sel = document.getElementById('animeSelect');
        sel.innerHTML = "<option>-- Select Anime --</option>";
        snap.forEach(doc => sel.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
    });
}

function deleteDoc(col, id){ if(confirm("Delete pakka?")) db.collection(col).doc(id).delete().then(() => location.reload()); }
</script>
</body>
</html>
