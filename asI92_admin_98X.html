<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Anime Street India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{background:#000;color:#fff;font-family:Arial, sans-serif;padding:10px}
        .box{max-width:900px;margin:20px auto;background:#111;padding:20px;border-radius:10px;border:1px solid #333}
        input,textarea,select,button{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #444;background:#222;color:#fff;box-sizing:border-box}
        button{background:red;color:white;font-weight:bold;cursor:pointer;border:none;transition:0.3s}
        button:hover{background:#b00000}
        .card{border:1px solid #444;padding:15px;margin:10px 0;border-radius:8px;background:#0a0a0a}
        h2{text-align:center;color:red;text-transform:uppercase}
        #panel{display:none}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .delete-btn{background:#444 !important;margin-top:5px}
        .delete-btn:hover{background:#ff0000 !important}
    </style>
</head>
<body>

<div id="loginBox" class="box">
    <h2>Admin Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg" style="color:red;text-align:center"></p>
</div>

<div id="panel">
    <div class="box">
        <h2>1. Manage Anime</h2>
        <input id="animeName" placeholder="Anime Name">
        <input id="animePoster" placeholder="Poster URL">
        <div class="grid-2">
            <input id="fullName" placeholder="Full Name">
            <input id="season" placeholder="Season No">
            <input id="runtime" placeholder="Runtime">
            <input id="totalep" placeholder="Total Episodes">
            <input id="network" placeholder="Network">
            <input id="year" placeholder="Year">
            <input id="lang" placeholder="Language">
            <input id="genre" placeholder="Genre">
            <input id="rating" placeholder="Rating">
        </div>
        <textarea id="desc" placeholder="Description"></textarea>
        <button onclick="saveAnime()">Save Anime</button>
        <div id="animeList" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
    </div>

    <div class="box">
        <h2>2. Manage Episodes</h2>
        <select id="animeSelect" onchange="loadEpisodes()"></select> 
        <div class="grid-2">
            <input id="episodeNo" type="number" placeholder="Ep No">
            <input id="epName" placeholder="Episode Name">
        </div>
        <input id="watch" placeholder="Watch Link or IFRAME Code">
        <div class="grid-2">
            <input id="download" placeholder="Download Link">
            <input id="mega" placeholder="Mega Link">
        </div>
        <button onclick="saveEpisode()" style="background:green">Save Episode</button>
        <div id="episodeList"></div>
    </div>
    <button onclick="logout()" style="display:block; margin:20px auto; width:200px">Logout</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
const auth = firebase.auth();
const db = firebase.firestore();
let editAnimeId = null, editEpisodeId = null;

auth.onAuthStateChanged(user => {
 if(user){ loginBox.style.display="none"; panel.style.display="block"; loadAnime(); }
 else { loginBox.style.display="block"; panel.style.display="none"; }
});

function login(){ auth.signInWithEmailAndPassword(loginEmail.value, loginPass.value).catch(err => alert(err.message)); }
function logout(){ auth.signOut(); }

function saveAnime(){
 let data = { name: animeName.value, poster: animePoster.value, fullName: fullName.value, season: season.value, runtime: runtime.value, totalEpisodes: totalep.value, network: network.value, year: year.value, language: lang.value, genre: genre.value, rating: rating.value, description: desc.value };
 editAnimeId ? db.collection("anime").doc(editAnimeId).update(data) : db.collection("anime").add(data);
 alert("Anime Saved!");
}

function loadAnime(){
 db.collection("anime").onSnapshot(snap => {
  animeList.innerHTML = ""; animeSelect.innerHTML = "<option value=''>-- Select Anime --</option>";
  snap.forEach(doc => {
   let a = doc.data();
   animeList.innerHTML += `<div class="card"><b>${a.name}</b><br><button onclick="editAnime('${doc.id}')">Edit</button></div>`;
   animeSelect.innerHTML += `<option value="${a.name}">${a.name}</option>`;
  });
 });
}

function saveEpisode(){
 let selected = animeSelect.value;
 if(!selected) return alert("Select Anime!");
 let data = {
  animeName: selected.toLowerCase().trim(),
  episodeNo: Number(episodeNo.value),
  epName: epName.value,
  watch: watch.value.trim(),
  download: download.value,
  mega: mega.value
 };
 editEpisodeId ? db.collection("episodes").doc(editEpisodeId).update(data) : db.collection("episodes").add(data);
 alert("Episode Saved!");
 // Clear inputs
 episodeNo.value = ""; epName.value = ""; watch.value = ""; download.value = ""; mega.value = ""; editEpisodeId = null;
}

function loadEpisodes() {
    let selected = animeSelect.value;
    if(!selected) return;
    db.collection("episodes").where("animeName", "==", selected.toLowerCase().trim()).orderBy("episodeNo", "desc").onSnapshot(snap => {
        episodeList.innerHTML = "";
        snap.forEach(doc => {
            let e = doc.data();
            episodeList.innerHTML += `
                <div class="card">
                    <b>EP ${e.episodeNo}: ${e.epName || ''}</b>
                    <div class="grid-2">
                        <button onclick="editEpisode('${doc.id}')">Edit</button>
                        <button class="delete-btn" onclick="deleteEpisode('${doc.id}')">Delete</button>
                    </div>
                </div>`;
        });
    });
}

function editEpisode(id){
 db.collection("episodes").doc(id).get().then(d => {
  let e = d.data();
  episodeNo.value = e.episodeNo; epName.value = e.epName;
  watch.value = e.watch; download.value = e.download; mega.value = e.mega;
  editEpisodeId = id;
  window.scrollTo(0,0);
 });
}

function deleteEpisode(id) {
    if(confirm("Kya aap sach mein ye episode delete karna chahte hain?")) {
        db.collection("episodes").doc(id).delete().then(() => alert("Episode Deleted!"));
    }
}
</script>
</body>
</html>
