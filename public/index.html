<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="btsM8oQlIy13AB2OqoyT1s_YSn7mVFwBeJZKVHM0tIM" />
    <meta name="google-site-verification" content="TZ_LZ4YPTTEddxmWa3ZADz-hbMQ97UnAw-LrfxQ7qq0" />
    <meta name="google-site-verification" content="ZQD5-NxpUlFbdVE178EJiDB-I2L0HEqj_KcsZi3O9sk" />
    <title>Anime Street India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --netflix-red: #E50914; --bg-black: #050505; --card-bg: #141414; --accent: #00ffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background: var(--bg-black); color: white; overflow-x: hidden; padding-bottom: 80px; }

        nav { background: rgba(0,0,0,0.8); padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; position: fixed; top:0; width: 100%; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; color: var(--netflix-red); }

        .hero { width: 100%; height: 60vh; position: relative; display: flex; align-items: center; padding: 0 4%; background-size: cover; background-position: center; transition: 1s ease-in-out; }
        .hero::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, var(--bg-black), transparent); }
        .hero-content { position: relative; z-index: 10; }
        .hero-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px #000; }
        .hero-btn { padding: 12px 25px; background: white; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #searchContainer { padding: 80px 4% 10px; display: none; background: #000; }
        #searchInput { width: 100%; padding: 15px; border-radius: 8px; border: 2px solid var(--netflix-red); background: #111; color: white; outline:none; }

        .anime-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding: 10px 4%; }
        .anime-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .section-title { padding: 20px 4% 5px; font-size: 20px; font-weight: bold; color: var(--accent); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; z-index: 2000; }
        .nav-item { color: #888; text-decoration: none; text-align: center; font-size: 11px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Anime Street India</div>
    <i class="fas fa-search" onclick="toggleSearch()" style="cursor:pointer"></i>
</nav>

<div id="searchContainer">
    <input type="text" id="searchInput" placeholder="Type anime name..." onkeyup="searchAnime()">
</div>

<!-- Hero Slider Section -->
<div id="hero" class="hero">
    <div class="hero-content">
        <h1 id="heroTitle" class="hero-title">Discover Anime</h1>
        <button id="heroBtn" class="hero-btn">Watch Now</button>
    </div>
</div>

<div id="mainLayout">
    <div id="continueWatching" style="display:none">
        <div class="section-title">Continue Watching</div>
        <div id="continue-grid" class="anime-row"></div>
    </div>
    
    <div class="section-title">Recommended for You</div>
    <div id="action-grid" class="anime-row"></div>
</div>

<div id="searchResultSection" class="anime-row" style="display:none"></div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
    <a href="#" class="nav-item" onclick="toggleSearch()"><i class="fas fa-search"></i>Search</a>
    <a href="contact.html" class="nav-item"><i class="fas fa-envelope"></i>Contact</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
    const db = firebase.firestore();
    let allData = [];

    db.collection("anime").onSnapshot(snap => {
        allData = [];
        snap.forEach(doc => allData.push(doc.data()));
        startHeroSlider();
        renderMain();
        checkContinue();
    });

    function startHeroSlider() {
        let i = 0;
        setInterval(() => {
            if(allData.length > 0 && document.getElementById('hero').style.display !== 'none') {
                const anime = allData[i % allData.length];
                document.getElementById('hero').style.backgroundImage = `url(${anime.poster})`;
                document.getElementById('heroTitle').innerText = anime.name;
                document.getElementById('heroBtn').onclick = () => openAnime(anime.name, anime.poster);
                i++;
            }
        }, 5000);
    }

    function renderMain() {
        const grid = document.getElementById('action-grid');
        grid.innerHTML = allData.map(a => `
            <div class="anime-card" onclick="openAnime('${a.name}', '${a.poster}')">
                <img src="${a.poster}">
                <div style="padding:5px; font-size:12px; text-align:center">${a.name}</div>
            </div>`).join('');
    }

    // FIXED: Toggle Slider with Search
    function toggleSearch() {
        const s = document.getElementById('searchContainer');
        const h = document.getElementById('hero');
        const m = document.getElementById('mainLayout');
        const res = document.getElementById('searchResultSection');

        if(s.style.display === 'block') {
            s.style.display = 'none';
            h.style.display = 'flex';
            m.style.display = 'block';
            res.style.display = 'none';
        } else {
            s.style.display = 'block';
            h.style.display = 'none'; // Hide Hero on Search click
            m.style.display = 'none';
            window.scrollTo(0,0);
        }
    }

    function searchAnime() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        let res = document.getElementById('searchResultSection');
        let main = document.getElementById('mainLayout');
        let hero = document.getElementById('hero');

        if(q === "") { 
            res.style.display = 'none'; 
            main.style.display = 'block'; 
            hero.style.display = 'flex'; // Show Hero back if input empty[cite: 8]
            return; 
        }
        
        main.style.display = 'none';
        hero.style.display = 'none'; // Ensure Hero stays hidden during search[cite: 8]
        res.style.display = 'grid';
        let filtered = allData.filter(a => a.name.toLowerCase().includes(q));
        res.innerHTML = filtered.map(a => `<div class="anime-card" onclick="openAnime('${a.name}', '${a.poster}')"><img src="${a.poster}"><div style="padding:5px; font-size:12px">${a.name}</div></div>`).join('');
    }

    function openAnime(name, poster) {
        let list = JSON.parse(localStorage.getItem('watched')) || [];
        list = list.filter(x => x.name !== name);
        list.unshift({name, poster});
        localStorage.setItem('watched', JSON.stringify(list.slice(0, 4)));

        db.collection("userActivity").add({
            anime: name,
            time: new Date().toLocaleString(),
            device: navigator.userAgent.includes("Mobile") ? "Mobile" : "Desktop"
        });

        window.location.href = `episode.html?name=${encodeURIComponent(name)}`;
    }

    function checkContinue() {
        let list = JSON.parse(localStorage.getItem('watched')) || [];
        if(list.length > 0) {
            document.getElementById('continueWatching').style.display = 'block';
            document.getElementById('continue-grid').innerHTML = list.map(a => `
                <div class="anime-card" onclick="openAnime('${a.name}', '${a.poster}')">
                    <img src="${a.poster}">
                </div>`).join('');
        }
    }
</script>
</body>
</html>
