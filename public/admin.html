<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Admin Panel - ASI Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --netflix-red: #E50914; --bg: #050505; --card: #181818; --accent: #00ffff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; padding: 10px; margin: 0; }
        .box { max-width: 900px; margin: 20px auto; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #loginBox { text-align: center; max-width: 400px; padding: 40px 20px; margin: 100px auto; }
        h2 { text-align: center; color: var(--netflix-red); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
        
        input, textarea, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; outline: none; }
        button { background: var(--netflix-red); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #b00000; transform: scale(1.02); }

        .monitor-card { border: 1px solid var(--accent); padding: 15px; border-radius: 10px; background: rgba(0, 255, 255, 0.05); margin-bottom: 20px; }
        .activity-log { max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; font-family: monospace; border: 1px solid #222; }
        .log-item { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 12px; }

        .tab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #333; transition: 0.3s ease; }
        .tab-btn.active { background: var(--netflix-red); box-shadow: 0 0 10px var(--netflix-red); }

        .search-wrapper { position: relative; margin-bottom: 10px; }
        #animeSuggestions { position: absolute; top: 100%; left: 0; width: 100%; background: #222; border: 1px solid #444; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
        .suggestion-item:hover { background: var(--netflix-red); }

        .search-box { border: 1px solid var(--netflix-red); background: #1a1a1a; margin-bottom: 15px; font-weight: bold; }
        .list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .item-card b { display: block; margin-bottom: 10px; color: var(--accent); font-size: 14px; }
        
        .btn-group { display: flex; gap: 10px; }
        .edit-btn { background: #27ae60; font-size: 12px; padding: 8px; flex: 1; }
        .del-btn { background: #444; font-size: 12px; padding: 8px; flex: 1; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 11px; color: #aaa; margin-left: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="loginBox" class="box">
    <h2><i class="fas fa-user-shield"></i> ASI Login</h2>
    <input id="adminEmail" type="email" placeholder="Email">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
</div>

<div id="panel" style="display:none">
    <div class="box">
        <h2>ASI ADMIN PANEL</h2>
        
        <div class="monitor-card">
            <h3 style="color: var(--accent); font-size: 14px; margin: 0 0 10px 0;"><i class="fas fa-satellite-dish"></i> LIVE TRACKER</h3>
            <div id="activityLog" class="activity-log"></div>
        </div>

        <div class="tab-grid">
            <button id="t1" class="tab-btn active" onclick="switchTab(1)">Anime</button>
            <button id="t2" class="tab-btn" onclick="switchTab(2)">Episodes</button>
        </div>

        <div id="s1">
            <input id="aName" placeholder="Anime Name">
            <input id="aPoster" placeholder="Poster URL">
            <div class="form-grid">
                <div><label>Season</label><input id="aSeason" placeholder="Ex: 1"></div>
                <div><label>Year</label><input id="aYear" placeholder="Ex: 2024"></div>
            </div>
            <div class="form-grid">
                <div><label>Genre</label><select id="aGenre"><option value="Action">Action</option><option value="Adventure">Adventure</option><option value="Comedy">Comedy</option><option value="Fantasy">Fantasy</option><option value="Movies">Movies</option><option value="Romance">Romance</option></select></div>
                <div><label>Rating</label><input id="aRating" placeholder="Ex: 8.5"></div>
            </div>
            <textarea id="aDesc" placeholder="Description" rows="3"></textarea>
            <button onclick="saveAnime()" id="saveBtn">PUBLISH</button>
            <hr style="border: 0.5px solid #333; margin: 30px 0;">
            <input type="text" id="searchAnimeList" class="search-box" placeholder="🔍 Search Anime List..." onkeyup="filterAnimeList()">
            <div id="animeList" class="list-container"></div>
        </div>

        <div id="s2" style="display:none">
            <div class="search-wrapper">
                <input type="text" id="animeSearchInput" placeholder="Search Anime Database..." onkeyup="searchAnimeForEp()">
                <div id="animeSuggestions"></div>
            </div>
            <select id="animeSelect" onchange="syncSelection(this.value)"></select>
            <p id="currentSelection" style="color:var(--accent); font-size:12px; margin: 10px 0; font-weight: bold;"></p>
            <input id="epNo" type="number" placeholder="Episode No.">
            <input id="epTitle" type="text" placeholder="Title (Optional)">
            <textarea id="epWatch" placeholder="Watch Link"></textarea>
            <input id="epDown" placeholder="Download Link">
            <button onclick="saveEpisode()" id="epSaveBtn">SAVE EPISODE</button>
            <hr style="border: 0.5px solid #333; margin: 30px 0;">
            <input type="text" id="searchEpList" class="search-box" placeholder="🔍 Search Ep Number..." onkeyup="filterEpList()">
            <div id="episodeList" class="list-container"></div>
        </div>
        
        <button onclick="logout()" style="background:#333; margin-top:40px;">LOGOUT</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
const db = firebase.firestore();
const auth = firebase.auth();
let editId = null, epEditId = null, fullAnimeData = [], fullEpData = [];

function login() {
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPass').value;
    auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
}
function logout() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginBox').style.display = "none";
        document.getElementById('panel').style.display = "block";
        loadAnimeList();
        loadLiveActivity();
    } else {
        document.getElementById('loginBox').style.display = "block";
        document.getElementById('panel').style.display = "none";
    }
});

function loadLiveActivity() {
    db.collection("userActivity").orderBy("time", "desc").limit(15).onSnapshot(snap => {
        const log = document.getElementById('activityLog');
        log.innerHTML = "";
        snap.forEach(doc => {
            const a = doc.data();
            log.innerHTML += `<div class="log-item"><span>${a.device === "Mobile" ? "📱" : "💻"} <b>${a.anime}</b></span><span>${a.time}</span></div>`;
        });
    });
}

function switchTab(n){
    document.getElementById('s1').style.display = n==1?'block':'none';
    document.getElementById('s2').style.display = n==2?'block':'none';
    document.getElementById('t1').className = n==1?'tab-btn active':'tab-btn';
    document.getElementById('t2').className = n==2?'tab-btn active':'tab-btn';
    if(n==2) updateSelect();
}

function loadAnimeList(){
    db.collection("anime").onSnapshot(snap => {
        fullAnimeData = [];
        snap.forEach(doc => { fullAnimeData.push({id: doc.id, ...doc.data()}); });
        renderAnimeList(fullAnimeData);
    });
}

function renderAnimeList(data) {
    const list = document.getElementById('animeList');
    list.innerHTML = data.map(a => `<div class="item-card"><b>${a.name}</b><div class="btn-group"><button class="edit-btn" onclick="editAnime('${a.id}')">EDIT</button><button class="del-btn" onclick="deleteDoc('anime','${a.id}')">DEL</button></div></div>`).join('');
}

function filterAnimeList() {
    let q = document.getElementById('searchAnimeList').value.toLowerCase();
    renderAnimeList(fullAnimeData.filter(a => a.name.toLowerCase().includes(q)));
}

function searchAnimeForEp() {
    let q = document.getElementById('animeSearchInput').value.toLowerCase();
    let sugg = document.getElementById('animeSuggestions');
    if(q.length < 1) { sugg.style.display = "none"; return; }
    let filtered = fullAnimeData.filter(a => a.name.toLowerCase().includes(q));
    sugg.innerHTML = filtered.map(a => `<div class="suggestion-item" onclick="syncSelection('${a.name}')">${a.name}</div>`).join('');
    sugg.style.display = "block";
}

function syncSelection(name) {
    document.getElementById('animeSelect').value = name;
    document.getElementById('animeSearchInput').value = name;
    document.getElementById('animeSuggestions').style.display = "none";
    document.getElementById('currentSelection').innerText = "Selected: " + name;
    loadEpisodes(name);
}

function updateSelect(){
    const sel = document.getElementById('animeSelect');
    sel.innerHTML = "<option value=''>-- Manual Select --</option>";
    fullAnimeData.forEach(a => sel.innerHTML += `<option value="${a.name}">${a.name}</option>`);
}

function loadEpisodes(name){
    db.collection("episodes").where("animeName", "==", name.toLowerCase().trim()).orderBy("episodeNo", "desc").onSnapshot(snap => {
        fullEpData = [];
        snap.forEach(doc => { fullEpData.push({id: doc.id, ...doc.data()}); });
        renderEpList(fullEpData);
    });
}

function renderEpList(data) {
    const list = document.getElementById('episodeList');
    list.innerHTML = data.map(e => `<div class="item-card"><b>Ep. ${e.episodeNo}</b><div class="btn-group"><button class="edit-btn" onclick="editEp('${e.id}')">EDIT</button><button class="del-btn" onclick="deleteDoc('episodes','${e.id}')">DEL</button></div></div>`).join('');
}

function filterEpList() {
    let q = document.getElementById('searchEpList').value.toLowerCase();
    renderEpList(fullEpData.filter(e => String(e.episodeNo).includes(q)));
}

function saveAnime(){
    const d = { name: document.getElementById('aName').value.trim(), poster: document.getElementById('aPoster').value.trim(), genre: document.getElementById('aGenre').value, season: document.getElementById('aSeason').value, year: document.getElementById('aYear').value, rating: document.getElementById('aRating').value, description: document.getElementById('aDesc').value.trim(), timestamp: firebase.firestore.FieldValue.serverTimestamp() };
    const ref = editId ? db.collection("anime").doc(editId).update(d) : db.collection("anime").add(d);
    ref.then(() => { alert("Saved!"); location.reload(); });
}

function saveEpisode(){
    const d = { animeName: document.getElementById('animeSelect').value.toLowerCase().trim(), episodeNo: Number(document.getElementById('epNo').value), episodeTitle: document.getElementById('epTitle').value.trim(), watch: document.getElementById('epWatch').value.trim(), download: document.getElementById('epDown').value.trim() };
    const ref = epEditId ? db.collection("episodes").doc(epEditId).update(d) : db.collection("episodes").add(d);
    ref.then(() => { alert("Saved!"); location.reload(); });
}

function editAnime(id){
    db.collection("anime").doc(id).get().then(s => {
        const a = s.data();
        document.getElementById('aName').value = a.name; document.getElementById('aPoster').value = a.poster;
        document.getElementById('aSeason').value = a.season; document.getElementById('aYear').value = a.year;
        document.getElementById('aGenre').value = a.genre; document.getElementById('aRating').value = a.rating;
        document.getElementById('aDesc').value = a.description;
        editId = id; document.getElementById('saveBtn').innerText = "UPDATE"; window.scrollTo(0,0);
    });
}

function editEp(id){
    db.collection("episodes").doc(id).get().then(s => {
        const e = s.data();
        document.getElementById('epNo').value = e.episodeNo; document.getElementById('epTitle').value = e.episodeTitle;
        document.getElementById('epWatch').value = e.watch; document.getElementById('epDown').value = e.download;
        epEditId = id; document.getElementById('epSaveBtn').innerText = "UPDATE"; window.scrollTo(0,0);
    });
}

function deleteDoc(col, id){ if(confirm("Delete?")) db.collection(col).doc(id).delete(); }
</script>
</body>
</html>
