<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching - Anime Street India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e50914; --bg: #050505; --card: #141414; }
        body { background: var(--bg); color: white; font-family: Arial, sans-serif; margin: 0; }
        .video-section { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden;}
        .video-section iframe { width: 100%; height: 100%; border: none; }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .ep-card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; }
        .ep-card.active { border-left-color: var(--primary); background: #222; }
        .btn-s { padding: 6px 12px; border-radius: 4px; text-decoration: none; color: white; font-size: 12px; font-weight: bold; background: var(--primary); }
    </style>
    <script src="https://pl29225155.profitablecpmratenetwork.com/7b/02/f5/7b02f5c2a1568ceeefe14b13aeae6666.js"></script>
</head>
<body>
    <div class="video-section" id="playerWrapper">
        </div>
    <div class="container">
        <h2 id="title">Loading...</h2>
        <h3>Available Episodes</h3>
        <div id="epList"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
        const db = firebase.firestore();
        
        const params = new URLSearchParams(window.location.search);
        let animeName = decodeURIComponent(params.get("name") || "");
        let videoData = params.get("v") || ""; 
        let currentEp = params.get("ep") || "";

        document.getElementById('title').innerText = animeName + (currentEp ? " - Episode " + currentEp : "");

        /* FIXED PLAYER LOGIC */
        function loadPlayer(data) {
            const wrapper = document.getElementById('playerWrapper');
            if(!data || data === "null") {
                wrapper.innerHTML = "<p style='color:gray;'>Select an episode to start watching</p>";
                return;
            }

            if(data.includes("<iframe")) {
                wrapper.innerHTML = data;
                let ifr = wrapper.querySelector('iframe');
                if(ifr) { ifr.style.width="100%"; ifr.style.height="100%"; }
            } else {
                let finalUrl = data;
                if(data.includes("rpmplay.me") && !data.includes("#")) {
                    finalUrl = data.replace("/e/", "/#");
                }
                wrapper.innerHTML = `<iframe src="${finalUrl}" allowfullscreen allow="autoplay; fullscreen"></iframe>`;
            }
        }

        // Initial load
        loadPlayer(videoData);

        // Fetch episodes
        db.collection("episodes").where("animeName", "==", animeName.toLowerCase().trim()).orderBy("episodeNo", "asc").onSnapshot(snap => {
            const list = document.getElementById('epList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const e = doc.data();
                const isActive = e.episodeNo == currentEp ? 'active' : '';
                
                // FIXED: Using e.watch because that's your Firebase field name
                list.innerHTML += `
                    <div class="ep-card ${isActive}">
                        <span><b>EP ${e.episodeNo}</b></span>
                        <a href="watch.html?name=${encodeURIComponent(animeName)}&ep=${e.episodeNo}&v=${encodeURIComponent(e.watch)}" class="btn-s">Watch</a>
                    </div>`;
            });
        });
    </script>
    <script src="https://pl29225156.profitablecpmratenetwork.com/0a/8f/cd/0a8fcdf42c3a0a6cea135fe202d327a9.js"></script>
</body>
</html>
