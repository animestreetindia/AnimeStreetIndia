<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching - Anime Street India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e50914; --bg: #050505; --card: #141414; }
        body { background: var(--bg); color: white; font-family: Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        .video-section { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-bottom: 3px solid var(--primary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative;
            z-index: 10;
        }
        
        .video-section iframe { width: 100%; height: 100%; border: none; position: absolute; top:0; left:0; }

        /* Custom Fullscreen Button (No Ads here) */
        #custom-fs {
            position: absolute;
            bottom: 40px; 
            right: 15px;
            z-index: 1000;
            background: rgba(0,0,0,0.6);
            color: #00ffff; 
            border: 1px solid var(--primary);
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }

        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .ep-card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; text-decoration:none; color:white; cursor: pointer; transition: 0.2s; }
        .ep-card:hover { background: #222; }
        .ep-card.active { border-left-color: var(--primary); background: #222; pointer-events: none; }
        .btn-s { padding: 6px 12px; border-radius: 4px; background: var(--primary); font-size: 12px; font-weight: bold; min-width: 70px; text-align: center; }
        .ad-slot { text-align: center; margin: 20px 0; min-height: 250px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>
    <div class="video-section" id="playerWrapper">
        <div style="color:var(--primary); font-weight:bold;">🎥 Loading Video Player...</div>
    </div>

    <div class="container">
        <h2 id="title">Loading Title...</h2>
        <h3 style="color:var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px;">Available Episodes</h3>
        <div id="epList"></div>

        <div class="ad-slot">
            <script type="text/javascript">
                atOptions = { 'key' : 'a207e5ed2e1ccc75632b8bf70031e4e8', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://dependedunmoved.com/a207e5ed2e1ccc75632b8bf70031e4e8/invoke.js"></script>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        firebase.initializeApp({ apiKey: "AIzaSyDCS8ijIYoQ3Ho4nduNOs9XmYQtjeT9Jc0", authDomain: "animeshreet.firebaseapp.com", projectId: "animeshreet" });
        const db = firebase.firestore();
        const params = new URLSearchParams(window.location.search);
        let animeName = decodeURIComponent(params.get("name") || "");
        let currentEpNo = params.get("ep") || "";
        let initialVideo = decodeURIComponent(params.get("v") || "");

        function loadPlayer(encodedData, epNo) {
            let data = "";
            try { data = decodeURIComponent(escape(window.atob(encodedData))); } catch(e) { data = encodedData; }
            if(epNo) document.getElementById('title').innerText = animeName + " - Episode " + epNo;
            const wrapper = document.getElementById('playerWrapper');
            let finalUrl = data;
            if(data.includes("<iframe")) {
                let match = data.match(/src=["']([^"']+)["']/);
                finalUrl = match ? match[1] : data;
            }
            if(finalUrl.includes("rpmplay.me") && !finalUrl.includes("#")) finalUrl = finalUrl.replace("/e/", "/#");

            wrapper.innerHTML = `
                <iframe id="animePlayer" src="${finalUrl}" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" allow="autoplay; fullscreen"></iframe>
                <button id="custom-fs" onclick="forceFull()"><i class="fas fa-expand-arrows-alt"></i></button>`;
        }

        // Clean Fullscreen Function (No Ad window.open)
        function forceFull() {
            let elem = document.getElementById("animePlayer");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        }

        if (initialVideo) loadPlayer(window.btoa(unescape(encodeURIComponent(initialVideo))), currentEpNo);

        db.collection("episodes").where("animeName", "==", animeName.toLowerCase().trim()).orderBy("episodeNo", "asc").onSnapshot(snap => {
            const list = document.getElementById('epList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const e = doc.data();
                let cleanEpNo = String(e.episodeNo).replace(/[^\d]/g, ''); 
                let encodedWatch = window.btoa(unescape(encodeURIComponent(e.watch || "")));
                const isActive = cleanEpNo == currentEpNo ? 'active' : '';
                
                // Ads only on Episode Selection
                list.innerHTML += `<div class="ep-card ${isActive}" onclick="window.open('https://dependedunmoved.com/pi0vr4p9?key=9fec2047a47d1017262caad9d20d19b5', '_blank'); loadPlayer('${encodedWatch}', '${cleanEpNo}')"><span><b>EPISODE ${cleanEpNo}</b></span><div class="btn-s">${isActive ? 'Playing' : 'Watch'}</div></div>`;
            });
        });

        // Page scripts for Popunder and Social Bar
        window.addEventListener('load', () => {
            setTimeout(() => {
                const p = document.createElement('script'); p.src = "https://dependedunmoved.com/e4/ef/d8/e4efd879d4f1bed352182bd6e54e2428.js"; document.body.appendChild(p);
                const s = document.createElement('script'); s.src = "https://pl29244818.profitablecpmratenetwork.com/1a/41/15/1a4115923b16006b6f1a5fbf8df5a93c.js"; document.body.appendChild(s);
            }, 1000);
        });
    </script>
</body>
</html>
