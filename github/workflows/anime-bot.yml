name: Hourly Anime Bot
on:
  schedule:
    - cron: '0 * * * *' # Every 1 hour
  workflow_dispatch: # Manually chalane ke liye button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Node
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      - run: npm install axios
      - run: node auto-fetch.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          
